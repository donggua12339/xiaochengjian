name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  # 阶段 1: 代码检查(所有 PR 必过)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # 阶段 2: 单元测试(Rust 核心必须 90%)
  test-rust:
    name: Rust Test (≥90% coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-android/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo install cargo-tarpaulin
      - run: cargo tarpaulin --workspace --out Xml --output-dir coverage/
        continue-on-error: false
      - name: Coverage gate (≥90%)
        run: |
          COV=$(python3 -c "import xml.etree.ElementTree as ET; t=ET.parse('coverage/cobertura.xml'); print(float(t.getroot().attrib['line-rate'])*100)")
          echo "Coverage: ${COV}%"
          if (( $(echo "$COV < 90" | bc -l) )); then echo "FAIL: Rust coverage < 90%"; exit 1; fi

  # 阶段 3: 后端测试(≥80%)
  test-backend:
    name: Backend Test (≥80% coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: xiaochengjian_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: [6379:6379]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:cov
      - name: Coverage gate (≥80%)
        run: |
          COV=$(node -e "const r=require('./coverage/coverage-summary.json'); console.log(r.total.lines.pct)")
          echo "Coverage: ${COV}%"
          if [ $(echo "$COV < 80" | bc -l) -eq 1 ]; then echo "FAIL: Backend coverage < 80%"; exit 1; fi

  # 阶段 4: 前端测试
  test-admin-web:
    name: Admin Web Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build

  # 阶段 5: Android SDK 构建
  build-sdk:
    name: Android SDK Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew :kotlin:assembleDebug

  # 阶段 6: 安全扫描(每日 + main 分支)
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.schedule
    steps:
      - uses: actions/checkout@v4
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
        working-directory: sdk-android/rust
      - run: cargo audit
        working-directory: sdk-android/rust

  # 阶段 7: 集成测试(main 分支)
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: xiaochengjian_test
        ports: [5432:5432]
      redis:
        image: redis:7
        ports: [6379:6379]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter backend test:e2e
