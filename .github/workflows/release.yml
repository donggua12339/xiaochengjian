name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ============= 后端 Docker 镜像 =============
  backend-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: xiaochengjian/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/backend.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ============= SDK AAR + .so =============
  sdk-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Rust .so(3 ABI)
        working-directory: sdk-android/rust
        run: |
          cargo build --target aarch64-linux-android --release
          cargo build --target armv7-linux-androideabi --release
          cargo build --target x86_64-linux-android --release
      - name: Copy .so to jniLibs
        run: |
          mkdir -p sdk-android/kotlin/xcj-sdk/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}
          cp sdk-android/rust/target/aarch64-linux-android/release/libxcj_core.so sdk-android/kotlin/xcj-sdk/src/main/jniLibs/arm64-v8a/
          cp sdk-android/rust/target/armv7-linux-androideabi/release/libxcj_core.so sdk-android/kotlin/xcj-sdk/src/main/jniLibs/armeabi-v7a/
          cp sdk-android/rust/target/x86_64-linux-android/release/libxcj_core.so sdk-android/kotlin/xcj-sdk/src/main/jniLibs/x86_64/
      - name: Build AAR
        working-directory: sdk-android/kotlin
        run: ./gradlew :xcj-sdk:assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: xcj-sdk-aar
          path: sdk-android/kotlin/xcj-sdk/build/outputs/aar/*.aar

  # ============= 注入工具 jar =============
  injector-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build fat jar
        working-directory: injector
        run: ./gradlew jar
      - uses: actions/upload-artifact@v4
        with:
          name: xcj-injector
          path: injector/build/libs/*.jar

  # ============= GitHub Release =============
  github-release:
    needs: [backend-image, sdk-release, injector-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/xcj-sdk-aar/*.aar
            artifacts/xcj-injector/*.jar
