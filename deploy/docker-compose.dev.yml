# 小城笺 · 开发环境 Docker Compose
# 仅用于本地开发,起 PostgreSQL 16 + Redis 7
# 生产部署用 deploy/docker-compose.yml(M3 阶段写)
#
# 启动:docker compose -f deploy/docker-compose.dev.yml up -d
# 停止:docker compose -f deploy/docker-compose.dev.yml down
# 清空数据:docker compose -f deploy/docker-compose.dev.yml down -v

name: xiaochengjian-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: xcj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xiaochengjian
      POSTGRES_PASSWORD: changeme_dev_only
      POSTGRES_DB: xiaochengjian
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - xcj_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiaochengjian -d xiaochengjian"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: xcj-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - xcj_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  xcj_pg_data:
    name: xcj_pg_data
  xcj_redis_data:
    name: xcj_redis_data
