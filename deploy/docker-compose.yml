# 小城笺 · Docker Compose 部署(开源版)
# 详见 ADR 0012 (Docker Compose + K8s 双模式)
#
# 用法:
#   1. cp .env.example .env && 修改配置
#   2. docker compose up -d
#   3. 访问 http://localhost
#
# 服务:
#   - nginx:反向代理 + HTTPS(80/443)
#   - backend:NestJS API(3000)
#   - postgres:PostgreSQL 17(5432)
#   - redis:Redis 7(6379)
#   - prometheus:指标采集(9090)
#   - grafana:仪表盘(3001)
#   - loki:日志聚合(3100)
#   - promtail:日志收集

services:
  # ============= 数据库 =============
  postgres:
    image: postgres:17-alpine
    container_name: xcj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xcj_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-xiaochengjian}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xcj_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [xcj-net]

  # ============= 缓存 =============
  redis:
    image: redis:7-alpine
    container_name: xcj-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [xcj-net]

  # ============= 后端 API =============
  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: xcj-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-xcj_admin}:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/${POSTGRES_DB:-xiaochengjian}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis}
      REDIS_DB: 0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      TOTP_ISSUER: Xiaochengjian
      TOTP_ALGORITHM: sha1
      TOTP_DIGITS: 6
      TOTP_STEP: 30
      RSA_PRIVATE_KEY_PATH: /app/keys/private.pem
      RSA_PUBLIC_KEY_PATH: /app/keys/public.pem
      SDK_SESSION_TTL: 3600
      RATE_LIMIT_IP_PER_MINUTE: 60
      RATE_LIMIT_DEVICE_PER_MINUTE: 30
      RATE_LIMIT_FAIL_LOCK_THRESHOLD: 5
      RATE_LIMIT_FAIL_LOCK_TTL: 3600
      OFFLINE_CACHE_DEFAULT_DAYS: 7
      OFFLINE_CACHE_MAX_DAYS: 30
      CARD_KEY_BATCH_MAX: 10000
      LOG_LEVEL: info
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ADMIN_WEB_URL: ${ADMIN_WEB_URL:-http://localhost}
      # 自有 APK 诊断(ADR 0077)
      AUDIT_TMP_ROOT: /tmp/audit
      APKSIGNER_PATH: /opt/android-sdk/build-tools/34.0.0/apksigner
      AUDIT_REPORT_RETENTION_HOURS: 24
      AUDIT_MAX_CONCURRENT_PER_DEV: 1
      AUDIT_MAX_APK_SIZE_MB: 200
      AUDIT_TIMEOUT_SECONDS: 1800
      # 水印 AES-256 密钥(ADR 0030 §c,生产强制)
      WATERMARK_AES_KEY: ${WATERMARK_AES_KEY}
      # defender-sdk(ADR 0088,可选,未配则 defender 注入不可用)
      DEFENDER_AAR_PATH: /app/assets/defender-sdk/xcj-defender-sdk-v1.0.0.aar
      DEFENDER_DEX_PATH: /app/assets/defender-sdk/classes-defender-v1.0.0.dex
      # Integrity(方案 C 服务端 gate,ADR 0088 v2.1.1)
      # token 签名密钥(HMAC-SHA256,生产必须 32+ 字符)
      INTEGRITY_TOKEN_SECRET: ${INTEGRITY_TOKEN_SECRET}
      # RSA 私钥文件路径(PEM,挂载自 backend/keys/integrity/)
      INTEGRITY_RSA_PRIVATE_KEY_FILE: /app/keys/integrity/integrity_private.pem
      # OAuth(ADR 0074,可选)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      QQ_APP_ID: ${QQ_APP_ID:-}
      QQ_APP_KEY: ${QQ_APP_KEY:-}
    volumes:
      - ../backend/keys:/app/keys:ro
      - ../backend/assets:/app/assets:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [xcj-net]

  # ============= 前端管理后台 =============
  admin-web:
    build:
      context: ..
      dockerfile: deploy/admin-web.Dockerfile
    container_name: xcj-admin-web
    restart: unless-stopped
    depends_on: [backend]
    networks: [xcj-net]

  # ============= 反向代理 =============
  nginx:
    image: nginx:alpine
    container_name: xcj-nginx
    restart: unless-stopped
    depends_on: [backend, admin-web]
    ports:
      - "127.0.0.1:8088:80"  # 仅内部,宿主机 nginx 反代 xcj-api.winmelon.cn → 8088
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro  # HTTPS 证书
    networks: [xcj-net]

  # ============= 监控 =============
  prometheus:
    image: prom/prometheus:latest
    container_name: xcj-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [xcj-net]

  alertmanager:
    image: prom/alertmanager:latest
    container_name: xcj-alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    depends_on: [alertmanager-feishu]
    networks: [xcj-net]

  alertmanager-feishu:
    build:
      context: ./alertmanager-feishu
      dockerfile: Dockerfile
    container_name: xcj-alertmanager-feishu
    restart: unless-stopped
    environment:
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
    ports:
      - "5000:5000"
    networks: [xcj-net]

  grafana:
    image: grafana/grafana:latest
    container_name: xcj-grafana
    restart: unless-stopped
    depends_on: [prometheus, loki]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks: [xcj-net]

  loki:
    image: grafana/loki:latest
    container_name: xcj-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks: [xcj-net]

  promtail:
    image: grafana/promtail:latest
    container_name: xcj-promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on: [loki]
    networks: [xcj-net]

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  xcj-net:
    driver: bridge
