# 小城笺 Prometheus 配置
# 详见 ADR 0032 (监控告警)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警规则(飞书 webhook 在 alertmanager.yml 配置)
rule_files:
  - /etc/prometheus/rules.yml

# 告警推送到 AlertManager(M3.3 补充容器)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # 后端 NestJS 指标
  - job_name: 'xcj-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:3000']
        labels:
          service: 'backend'

  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9093']
